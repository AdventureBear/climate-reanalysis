name: Feature request
description: Propose a user-facing capability.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user or science workflow should this enable?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Expected frontend/backend/rendering/data areas.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      placeholder: |
        Backend:
        Frontend:
        Manual map recipe:
  - type: textarea
    id: docs
    attributes:
      label: Documentation Impact
      description: None, README, PROJECT, AGENTS, CLAUDE, or other.

