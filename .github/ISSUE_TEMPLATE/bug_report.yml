name: Bug report
description: Report broken or misleading deployed behavior.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, confusing, or scientifically misleading?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include map recipe details, URL params, dates, variable/level, region, and mode where possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - app unusable or scientifically misleading
        - P1 - important user-facing issue
        - P2 - needed soon, workaround exists
        - P3 - polish or low-risk cleanup
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Notes
      description: Commands, map recipes, screenshots, or logs that should verify the fix.

