name: Deployment / operations
description: Track Render, environment, caching, observability, and public-readiness work.
title: "[Deploy]: "
labels: ["area:deployment"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current State
  - type: textarea
    id: work
    attributes:
      label: Work Required
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Render checks, env vars, logs, health checks, or smoke recipes.
  - type: textarea
    id: rollback
    attributes:
      label: Rollback / Risk Notes

